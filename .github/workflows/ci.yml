name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Netlify function unit tests (pure JS, no network) ────────────────────
  test-functions:
    name: Function unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run function tests
        run: node --test --test-reporter=tap tests/function.test.mjs

  # ── 2. Firestore security rules tests (needs Firebase emulator) ─────────────
  test-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Run rules tests via emulator
        run: >
          firebase emulators:exec
          --only firestore
          --project demo-eyawriter
          "node --test --test-reporter=tap tests/rules.test.mjs"

  # ── 3. Playwright E2E tests ─────────────────────────────────────────────────
  test-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 4. Deployment readiness check ───────────────────────────────────────────
  audit:
    name: Deployment audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Check required env var placeholders exist in netlify.toml
        run: |
          echo "Verifying netlify.toml build config..."
          grep -q 'functions = "netlify/functions"' netlify.toml && echo "✓ functions dir" || exit 1
          grep -q 'node_bundler' netlify.toml && echo "✓ bundler config" || exit 1

      - name: Check all function files are present
        run: |
          for f in health ai-assist create-checkout billing-portal stripe-webhook verify-payment; do
            test -f "netlify/functions/${f}.js" && echo "✓ ${f}.js" || { echo "✗ missing ${f}.js"; exit 1; }
          done

      - name: Verify APP_VERSION is set
        run: |
          grep -q 'APP_VERSION' js/config.js && echo "✓ APP_VERSION defined" || exit 1

      - name: Check firestore.rules is valid (has required collections)
        run: |
          for rule in sharedProjects invitations users admins config webhookEvents; do
            grep -q "$rule" firestore.rules && echo "✓ $rule" || { echo "✗ missing $rule in rules"; exit 1; }
          done
